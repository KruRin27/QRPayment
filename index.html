<!DOCTYPE html>
<html>
<head>
  <script src="https://js.jotform.com/JotFormCustomWidget.min.js"></script>
</head>
<body>

<input type="date" id="birthday">
<button onclick="sendAge()">คำนวณ</button>

<p id="result"></p>

<script>
function sendAge() {
  let birth = new Date(document.getElementById("birthday").value);
  let target = new Date(2026,4,31);

  let years = target.getFullYear() - birth.getFullYear();
  let months = target.getMonth() - birth.getMonth();

  if (months < 0) {
    years--;
    months += 12;
  }

  if (target.getDate() < birth.getDate()) {
    months--;
    if (months < 0) {
      years--;
      months += 12;
    }
  }

  let result = years + " ปี " + months + " เดือน";

  document.getElementById("result").innerText = result;

  // 🔥 ส่งค่ากลับเข้า Jotform
  JFCustomWidget.sendSubmit({
    valid: true,
    value: result
  });
}
</script>

</body>
</html>
