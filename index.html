<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Age Calculator Widget</title>
  <script src="//js.jotform.com/JotFormCustomWidget.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sarabun', sans-serif;
      background: #fff;
      padding: 12px;
      font-size: 14px;
      color: #333;
    }
    .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    label { white-space: nowrap; color: #555; }
    input[type="date"] {
      flex: 1; min-width: 150px;
      padding: 7px 10px;
      border: 1px solid #ccc; border-radius: 5px;
      font-size: 14px; font-family: inherit; outline: none;
    }
    input[type="date"]:focus { border-color: #0099e5; }
    button {
      padding: 7px 16px; background: #0099e5; color: #fff;
      border: none; border-radius: 5px;
      font-size: 14px; font-family: inherit; cursor: pointer;
    }
    button:hover { background: #007bbf; }
    .result {
      margin-top: 10px; padding: 10px 14px;
      background: #f0f9ff; border: 1px solid #b3e0f7;
      border-radius: 5px; color: #005f8a; display: none;
      display: none; gap: 24px;
    }
    .result.show { display: flex; flex-wrap: wrap; }
    .result-item { display: flex; flex-direction: column; align-items: center; }
    .result-item strong { font-size: 28px; color: #0077bb; line-height: 1; }
    .result-item span { font-size: 12px; color: #4a9fc0; margin-top: 2px; }
    .error { margin-top: 6px; color: #c0392b; font-size: 13px; display: none; }
    .error.show { display: block; }
  </style>
</head>
<body>

  <div class="row">
    <label for="dob">วันเกิด:</label>
    <input type="date" id="dob">
    <button id="calcBtn">คำนวณอายุ</button>
  </div>

  <div class="error" id="errorMsg">⚠ กรุณาเลือกวันเกิดก่อนครับ</div>

  <div class="result" id="resultBox">
    <div class="result-item">
      <strong id="ageYear">-</strong>
      <span>ปี</span>
    </div>
    <div class="result-item">
      <strong id="ageMonth">-</strong>
      <span>เดือน</span>
    </div>
  </div>

<script>
  document.getElementById('dob').max = new Date().toISOString().split('T')[0];

  var currentYear  = "";
  var currentMonth = "";

  JFCustomWidget.subscribe("ready", function () {

    var savedValue = JFCustomWidget.getValue();
    if (savedValue) {
      // savedValue รูปแบบ "years,months"
      var parts = savedValue.split(",");
      currentYear  = parts[0] || "";
      currentMonth = parts[1] || "";
      document.getElementById('ageYear').textContent  = currentYear;
      document.getElementById('ageMonth').textContent = currentMonth;
      document.getElementById('resultBox').classList.add('show');
    }

    JFCustomWidget.subscribe("submit", function () {
      JFCustomWidget.sendSubmit({
        valid: currentYear !== "",
        value: currentYear + "," + currentMonth   // ส่ง "ปี,เดือน"
      });
    });

  });

  document.getElementById('calcBtn').addEventListener('click', function () {
    var dobVal  = document.getElementById('dob').value;
    var errorEl = document.getElementById('errorMsg');

    if (!dobVal) { errorEl.classList.add('show'); return; }
    errorEl.classList.remove('show');

    var dob   = new Date(dobVal);
    var today = new Date();

    var years  = today.getFullYear() - dob.getFullYear();
    var months = today.getMonth()    - dob.getMonth();
    var days   = today.getDate()     - dob.getDate();

    if (days < 0)   { months--; }
    if (months < 0) { years--; months += 12; }

    currentYear  = years.toString();
    currentMonth = months.toString();

    document.getElementById('ageYear').textContent  = currentYear;
    document.getElementById('ageMonth').textContent = currentMonth;
    document.getElementById('resultBox').classList.add('show');

    // ส่งค่า "ปี,เดือน" ไปยัง JotForm field ทันที
    JFCustomWidget.sendData({ value: currentYear + "," + currentMonth });

    JFCustomWidget.requestFrameResize({ height: document.body.scrollHeight });
  });
</script>

</body>
</html>
